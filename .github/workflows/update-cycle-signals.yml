name: Update Cycle Signals

on:
  schedule:
    # Run daily at 09:00 UTC
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Cache V3 API data
        uses: actions/cache@v4
        with:
          path: scripts/v3_production_0428/v3_experiment_v2/cache
          key: v3-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            v3-cache-${{ runner.os }}-

      - name: Cache K3 selected motifs
        uses: actions/cache@v4
        with:
          path: scripts/cache
          key: k3-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            k3-cache-${{ runner.os }}-

      - name: Run cycle signals report
        env:
          CRYPTOQUANT_KEY: ${{ secrets.CRYPTOQUANT_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/Production_v3_k3_one_step_10_90_add20_138.py

      - name: Commit updated cycle data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cycle_state.json data/cycle_history.json
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: update cycle signals $(date -u +%Y-%m-%d)"

      - name: Push changes
        run: git push
