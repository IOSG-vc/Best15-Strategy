name: Update Cycle Signals

on:
  schedule:
    # Run daily at 09:00 UTC
    - cron: "0 9 * * *"
  workflow_dispatch:

concurrency:
  group: update-cycle-signals
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "requirements.txt"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Restore V4 base-parts cache
        uses: actions/cache@v4
        with:
          path: cache/base_parts
          key: v4-base-parts-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            v4-base-parts-${{ runner.os }}-

      - name: Restore V4 K3 candidates cache
        uses: actions/cache@v4
        with:
          path: cache/k3_mined_candidates.csv
          key: v4-k3-candidates-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            v4-k3-candidates-${{ runner.os }}-

      - name: Run V4 production runner
        env:
          CRYPTOQUANT_API_KEY: ${{ secrets.CRYPTOQUANT_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python scripts/production_v4.py

      - name: Commit updated cycle data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/cycle_state.json data/cycle_history.json
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: update cycle signals $(date -u +%Y-%m-%d)"

      - name: Push changes
        run: git push
