name: Update Valuations

on:
  schedule:
    # Run daily at 10:00 UTC
    - cron: "0 10 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: "crypto_valuation_agents_bundle/webapp/requirements.txt"

      - name: Install Python dependencies
        run: pip install -r crypto_valuation_agents_bundle/webapp/requirements.txt

      - name: Run valuation agents
        env:
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          DEFILLAMA_API_KEY: ${{ secrets.DEFILLAMA_API_KEY }}
        run: python scripts/update_valuations.py

      - name: Commit updated valuations
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/valuations.json
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: update valuations $(date -u +%Y-%m-%d)"

      - name: Push changes
        run: git push
